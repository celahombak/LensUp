<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LensUp — Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --cream: #FAF7F2;
      --warm-white: #FDF9F4;
      --terracotta: #C4622D;
      --terracotta-light: #E8845A;
      --terracotta-pale: #F5E6DE;
      --brown: #6B3A2A;
      --text-dark: #2C1810;
      --text-mid: #7A5C4F;
      --text-light: #B09080;
      --border: #E8DDD5;
      --success: #4CAF50;
      --gold: #D4A853;
      --nav-h: 64px;
      --bottom-nav-h: 68px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      padding-bottom: calc(var(--bottom-nav-h) + 20px);
    }

    .top-nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .nav-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--terracotta); }
    .daily-badge {
      display: flex; align-items: center; gap: 5px;
      background: var(--terracotta-pale); border: 1px solid var(--terracotta-light);
      border-radius: 20px; padding: 6px 12px;
      font-size: 12px; font-weight: 600; color: var(--terracotta);
    }
    .daily-badge.full { background: #E8F5E9; border-color: #A5D6A7; color: var(--success); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: var(--bottom-nav-h);
      background: var(--warm-white);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: var(--text-light);
      font-size: 10px; font-weight: 500; padding: 8px 14px; transition: color 0.2s;
    }
    .nav-item.active { color: var(--terracotta); }
    .nav-item svg { width: 22px; height: 22px; }

    .main { padding: 16px 16px; max-width: 480px; margin: 0 auto; }

    /* SUBMIT CARD */
    .submit-card {
      background: white; border: 1.5px solid var(--border);
      border-radius: 18px; padding: 18px; margin-bottom: 20px;
    }
    .submit-card-title {
      font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .limit-label {
      font-size: 12px; font-weight: 500;
      color: var(--text-light); background: var(--cream);
      border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px;
    }
    .limit-label.full { color: var(--success); background: #E8F5E9; border-color: #A5D6A7; }

    .photo-picker {
      border: 2px dashed var(--border);
      border-radius: 14px; padding: 28px 20px;
      text-align: center; cursor: pointer;
      transition: all 0.2s; margin-bottom: 12px;
      background: var(--cream);
    }
    .photo-picker:hover { border-color: var(--terracotta-light); background: var(--terracotta-pale); }
    .photo-picker.has-image { border-style: solid; border-color: var(--terracotta-light); padding: 0; overflow: hidden; }
    .photo-picker img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 12px; display: block; }
    .picker-icon { font-size: 28px; margin-bottom: 8px; }
    .picker-label { font-size: 14px; font-weight: 500; color: var(--text-mid); }
    .picker-sub { font-size: 12px; color: var(--text-light); margin-top: 4px; }

    .caption-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      background: var(--cream); color: var(--text-dark);
      outline: none; transition: border-color 0.2s;
      resize: none; margin-bottom: 12px;
    }
    .caption-input:focus { border-color: var(--terracotta); }

    .submit-btn {
      width: 100%; padding: 15px;
      background: var(--terracotta); color: white;
      border: none; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover { background: var(--brown); transform: translateY(-1px); }
    .submit-btn:disabled { background: var(--text-light); cursor: not-allowed; transform: none; }

    /* ANALYZING */
    .analyzing-overlay {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(44,24,16,0.8); backdrop-filter: blur(8px);
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    .analyzing-overlay.open { display: flex; }
    .analyzing-spinner {
      width: 56px; height: 56px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: var(--terracotta-light);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .analyzing-text { color: white; font-size: 16px; font-weight: 500; }
    .analyzing-sub { color: rgba(255,255,255,0.6); font-size: 13px; }

    /* SCORE TOAST */
    .score-toast {
      display: none; position: fixed; bottom: calc(var(--bottom-nav-h) + 16px);
      left: 16px; right: 16px; max-width: 448px; margin: 0 auto;
      background: white; border: 1.5px solid var(--border);
      border-radius: 16px; padding: 16px; z-index: 500;
      box-shadow: 0 8px 32px rgba(44,24,16,0.15);
      animation: slideUp 0.3s ease;
    }
    .score-toast.show { display: block; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .score-toast-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .score-toast-title { font-size: 14px; font-weight: 700; color: var(--text-dark); }
    .score-toast-num { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--terracotta); }
    .score-toast-feedback { font-size: 13px; color: var(--text-mid); line-height: 1.5; margin-bottom: 10px; }
    .score-toast-close {
      width: 100%; padding: 10px;
      background: var(--cream); border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--text-mid);
    }

    /* FEED SECTION */
    .feed-section-hdr {
      font-size: 16px; font-weight: 700; color: var(--text-dark);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }

    /* FEED CARD */
    .feed-card {
      background: white; border: 1.5px solid var(--border);
      border-radius: 18px; margin-bottom: 14px; overflow: hidden;
    }
    .feed-card-header {
      display: flex; align-items: center; gap: 10px; padding: 13px 14px 10px;
    }
    .feed-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--terracotta-pale);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--terracotta);
      flex-shrink: 0; overflow: hidden;
    }
    .feed-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .feed-user-info { flex: 1; }
    .feed-username { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .feed-time { font-size: 11px; color: var(--text-light); }
    .feed-score-badge {
      background: var(--terracotta-pale); border: 1px solid var(--terracotta-light);
      border-radius: 20px; padding: 4px 10px;
      font-size: 12px; font-weight: 600; color: var(--terracotta);
    }

    .feed-image { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }

    .feed-card-footer { padding: 12px 14px; }
    .feed-actions { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .like-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--text-mid);
      padding: 6px 10px; border-radius: 20px;
      transition: all 0.2s;
    }
    .like-btn:hover { background: #FFF0F0; color: #E53935; }
    .like-btn.liked { color: #E53935; background: #FFF0F0; }
    .like-btn svg { width: 18px; height: 18px; transition: transform 0.15s; }
    .like-btn.liked svg { transform: scale(1.2); }

    .feed-caption { font-size: 13px; color: var(--text-dark); line-height: 1.5; margin-bottom: 6px; }
    .feed-caption .bold { font-weight: 600; }
    .feed-feedback {
      font-size: 12px; color: var(--text-mid); line-height: 1.5;
      background: var(--cream); border-radius: 8px; padding: 8px 10px;
      border-left: 3px solid var(--terracotta-light);
    }

    /* EMPTY STATE */
    .empty-feed {
      text-align: center; padding: 40px 20px; color: var(--text-light);
    }
    .empty-feed-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-feed-text { font-size: 15px; font-weight: 500; color: var(--text-mid); margin-bottom: 6px; }
    .empty-feed-sub { font-size: 13px; }

    /* LOAD MORE */
    .load-more-btn {
      width: 100%; padding: 13px;
      background: transparent; border: 1.5px solid var(--border);
      border-radius: 14px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: var(--text-mid); margin-top: 4px;
    }
    .load-more-btn:hover { border-color: var(--terracotta-light); color: var(--terracotta); }

    .toast {
      position: fixed; bottom: calc(var(--bottom-nav-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-dark); color: white;
      border-radius: 30px; padding: 10px 20px;
      font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 600; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .auth-gate {
      display: none; position: fixed; inset: 0; z-index: 700;
      background: var(--cream); flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px; text-align: center;
    }
    .auth-gate.open { display: flex; }
    .auth-gate h2 { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 10px; }
    .auth-gate p { color: var(--text-mid); margin-bottom: 30px; }
    .auth-gate a {
      background: var(--terracotta); color: white; padding: 15px 40px;
      border-radius: 14px; text-decoration: none; font-weight: 600; font-size: 16px;
    }

    #photoFileInput { display: none; }
  </style>
</head>
<body>

<nav class="top-nav">
  <span class="nav-logo">LensUp</span>
  <div class="daily-badge" id="dailyBadge">📷 0/3 today</div>
</nav>

<main class="main">

  <!-- Submit Card -->
  <div class="submit-card" id="submitCard">
    <div class="submit-card-title">
      Post a Photo
      <span class="limit-label" id="limitLabel">0 / 3 today</span>
    </div>

    <div class="photo-picker" id="photoPicker" onclick="triggerPicker()">
      <div class="picker-icon">📷</div>
      <div class="picker-label">Tap to choose a photo</div>
      <div class="picker-sub">JPG, PNG · Max 10MB</div>
    </div>
    <input type="file" id="photoFileInput" accept="image/*" />

    <textarea class="caption-input" id="captionInput" rows="2" placeholder="Add a caption… (optional)"></textarea>

    <button class="submit-btn" id="submitBtn" onclick="submitFeedPhoto()" disabled>
      Post to Feed
    </button>
  </div>

  <!-- Feed -->
  <div class="feed-section-hdr">
    Community Feed
    <span style="font-size:12px;color:var(--text-light);font-weight:400" id="feedCount"></span>
  </div>
  <div id="feedContainer"></div>
  <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()" style="display:none">Load more</button>

</main>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Home

  <a href="learn.html" class="nav-item">

    Learn
  </a>
  <a href="feed.html" class="nav-item active">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Feed

</nav>

<!-- Analyzing Overlay -->
<div class="analyzing-overlay" id="analyzingOverlay">
  <div class="analyzing-spinner"></div>
  <div class="analyzing-text">Analysing your photo…</div>
  <div class="analyzing-sub">AI scoring in progress</div>
</div>

<!-- Score Toast -->
<div class="score-toast" id="scoreToast">
  <div class="score-toast-top">
    <div class="score-toast-title">✓ Photo Posted!</div>
    <div class="score-toast-num" id="toastScore">—</div>
  </div>
  <div class="score-toast-feedback" id="toastFeedback"></div>
  <button class="score-toast-close" onclick="closeScoreToast()">Got it</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="auth-gate" id="authGate">
  <div style="font-size:48px;margin-bottom:16px">📷</div>
  <h2>Join LensUp</h2>
  <p>Share your photography with the community</p>
  <a href="index.html">Get Started</a>
</div>

<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const PAGE_SIZE = 10;
let currentUser = null;
let selectedFile = null;
let feedOffset = 0;
let todayCount = 0;
let likedPosts = new Set(); // analysis IDs liked by current user

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { document.getElementById('authGate').classList.add('open'); return; }
  currentUser = session.user;

  await checkDailyLimit();
  await loadLikes();
  await loadFeed();
}

async function checkDailyLimit() {
  const today = new Date().toDateString();
  const { data } = await sb
    .from('analyses')
    .select('id', { count: 'exact' })
    .eq('user_id', currentUser.id)
    .eq('source', 'feed');

  // Count today's posts
  const { data: todayData } = await sb
    .from('analyses')
    .select('created_at')
    .eq('user_id', currentUser.id)
    .eq('source', 'feed')
    .gte('created_at', new Date(new Date().setHours(0,0,0,0)).toISOString());

  todayCount = todayData?.length || 0;
  updateLimitUI();
}

function updateLimitUI() {
  const remaining = 3 - todayCount;
  const isFull = todayCount >= 3;

  document.getElementById('dailyBadge').textContent = `📷 ${todayCount}/3 today`;
  document.getElementById('dailyBadge').className = `daily-badge${isFull ? ' full' : ''}`;
  document.getElementById('limitLabel').textContent = `${todayCount} / 3 today`;
  document.getElementById('limitLabel').className = `limit-label${isFull ? ' full' : ''}`;

  if (isFull) {
    document.getElementById('photoPicker').style.opacity = '0.5';
    document.getElementById('photoPicker').style.pointerEvents = 'none';
    document.getElementById('captionInput').disabled = true;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '✓ Daily limit reached — come back tomorrow';
    document.getElementById('submitBtn').style.background = 'var(--success)';
  }
}

async function loadLikes() {
  try {
    const { data } = await sb
      .from('likes')
      .select('analysis_id')
      .eq('user_id', currentUser.id);
    (data || []).forEach(l => likedPosts.add(l.analysis_id));
  } catch (e) {
    // likes table may not exist yet — graceful fallback
    console.log('Likes table not available yet');
  }
}

async function loadFeed(append = false) {
  if (!append) feedOffset = 0;

  const { data: posts, error } = await sb
    .from('analyses')
    .select(`
      id, user_id, score, feedback, image_url, caption,
      composition_score, lighting_score, color_score, focus_score,
      created_at, source,
      profiles ( display_name, avatar_url )
    `)
    .in('source', ['feed', 'challenge'])
    .not('image_url', 'is', null)
    .order('created_at', { ascending: false })
    .range(feedOffset, feedOffset + PAGE_SIZE - 1);

  if (error) { console.error(error); return; }

  const container = document.getElementById('feedContainer');
  if (!append) container.innerHTML = '';

  if (!posts || posts.length === 0) {
    if (!append) {
      container.innerHTML = `
        <div class="empty-feed">
          <div class="empty-feed-icon">🌅</div>
          <div class="empty-feed-text">No photos yet</div>
          <div class="empty-feed-sub">Be the first to post!</div>
        </div>`;
    }
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }

  posts.forEach(post => {
    const card = buildFeedCard(post);
    container.insertAdjacentHTML('beforeend', card);
  });

  feedOffset += posts.length;
  document.getElementById('loadMoreBtn').style.display = posts.length === PAGE_SIZE ? 'block' : 'none';
}

function buildFeedCard(post) {
  const name = post.profiles?.display_name || 'Photographer';
  const initials = name.charAt(0).toUpperCase();
  const avatar = post.profiles?.avatar_url
    ? `<img src="${post.profiles.avatar_url}" />`
    : initials;

  const timeAgo = getTimeAgo(post.created_at);
  const isLiked = likedPosts.has(post.id);
  const isOwn = post.user_id === currentUser?.id;
  const sourceTag = post.source === 'challenge'
    ? `<span style="font-size:10px;background:#FFF8E7;border:1px solid #F0D080;border-radius:20px;padding:2px 8px;color:var(--gold);font-weight:600;margin-left:6px">🏆 Challenge</span>`
    : '';

  return `
    <div class="feed-card" id="card-${post.id}">
      <div class="feed-card-header">
        <div class="feed-avatar">${avatar}</div>
        <div class="feed-user-info">
          <div class="feed-username">${escHtml(name)}${sourceTag}</div>
          <div class="feed-time">${timeAgo}</div>
        </div>
        ${post.score ? `<div class="feed-score-badge">⭐ ${post.score}</div>` : ''}
      </div>
      <img class="feed-image" src="${post.image_url}" loading="lazy" />
      <div class="feed-card-footer">
        <div class="feed-actions">
          <button
            class="like-btn ${isLiked ? 'liked' : ''}"
            id="like-btn-${post.id}"
            onclick="toggleLike('${post.id}', ${isLiked})"
          >
            <svg fill="${isLiked ? '#E53935' : 'none'}" stroke="${isLiked ? '#E53935' : 'currentColor'}" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
            <span id="like-count-${post.id}">Like</span>
          </button>
        </div>
        ${post.caption ? `<div class="feed-caption"><span class="bold">${escHtml(name)}</span> ${escHtml(post.caption)}</div>` : ''}
        ${post.feedback ? `<div class="feed-feedback">💬 ${escHtml(post.feedback)}</div>` : ''}
      </div>
    </div>`;
}

async function toggleLike(analysisId, isCurrentlyLiked) {
  if (!currentUser) return;
  const btn = document.getElementById(`like-btn-${analysisId}`);
  const countEl = document.getElementById(`like-count-${analysisId}`);

  try {
    if (isCurrentlyLiked) {
      await sb.from('likes').delete()
        .eq('user_id', currentUser.id)
        .eq('analysis_id', analysisId);
      likedPosts.delete(analysisId);
      btn.classList.remove('liked');
      btn.querySelector('svg').setAttribute('fill', 'none');
      btn.querySelector('svg').setAttribute('stroke', 'currentColor');
      btn.onclick = () => toggleLike(analysisId, false);
    } else {
      await sb.from('likes').insert({ user_id: currentUser.id, analysis_id: analysisId });
      likedPosts.add(analysisId);
      btn.classList.add('liked');
      btn.querySelector('svg').setAttribute('fill', '#E53935');
      btn.querySelector('svg').setAttribute('stroke', '#E53935');
      btn.onclick = () => toggleLike(analysisId, true);
    }
  } catch (e) {
    showToast('Like feature coming soon!');
  }
}

// ── SUBMIT FLOW ──
function triggerPicker() {
  if (todayCount >= 3) return;
  const input = document.getElementById('photoFileInput');
  input.value = '';
  input.onchange = handleFileChosen;
  input.click();
}

function handleFileChosen(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;

  const reader = new FileReader();
  reader.onload = ev => {
    const picker = document.getElementById('photoPicker');
    picker.classList.add('has-image');
    picker.innerHTML = `<img src="${ev.target.result}" />`;
    picker.onclick = triggerPicker; // allow re-pick
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Post to Feed';
  };
  reader.readAsDataURL(file);
}

async function submitFeedPhoto() {
  if (!selectedFile || todayCount >= 3) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="analyzing-spinner" style="width:18px;height:18px;border-width:2px"></div> Posting…';
  document.getElementById('analyzingOverlay').classList.add('open');

  try {
    const base64 = await fileToBase64(selectedFile);
    const caption = document.getElementById('captionInput').value.trim();

    // AI analysis
    const result = await analyzePhoto(base64);

    // Upload to storage
    const fileName = `feed/${currentUser.id}/${Date.now()}.jpg`;
    const byteArr = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    const blob = new Blob([byteArr], { type: 'image/jpeg' });
    const { data: uploadData } = await sb.storage.from('photos').upload(fileName, blob);
    let imageUrl = null;
    if (uploadData?.path) {
      const { data: urlData } = sb.storage.from('photos').getPublicUrl(uploadData.path);
      imageUrl = urlData?.publicUrl;
    }

    // Save
    await sb.from('analyses').insert({
      user_id: currentUser.id,
      source: 'feed',
      score: result.score,
      composition_score: result.composition,
      lighting_score: result.lighting,
      color_score: result.color,
      focus_score: result.focus,
      feedback: result.feedback,
      caption: caption || null,
      image_url: imageUrl,
      created_at: new Date().toISOString()
    });

    todayCount++;
    updateLimitUI();

    // Reset form
    document.getElementById('analyzingOverlay').classList.remove('open');
    const picker = document.getElementById('photoPicker');
    picker.classList.remove('has-image');
    picker.innerHTML = `<div class="picker-icon">📷</div><div class="picker-label">Tap to choose a photo</div><div class="picker-sub">JPG, PNG · Max 10MB</div>`;
    picker.onclick = triggerPicker;
    document.getElementById('captionInput').value = '';
    selectedFile = null;
    btn.disabled = false;
    btn.textContent = 'Post to Feed';

    // Show score toast
    document.getElementById('toastScore').textContent = result.score;
    document.getElementById('toastFeedback').textContent = result.feedback;
    document.getElementById('scoreToast').classList.add('show');

    // Reload feed
    await loadFeed();

  } catch (err) {
    console.error('Submit error:', err);
    document.getElementById('analyzingOverlay').classList.remove('open');
    showToast('Failed to post. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Post to Feed';
  }
}

async function analyzePhoto(base64) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 300,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
          { type: 'text', text: `You are an expert photography coach. Score this photo on: composition (0-100), lighting (0-100), color (0-100), focus (0-100), and overall (0-100). Provide 1-2 sentences of specific, encouraging feedback.

Respond ONLY in this exact JSON format (no markdown):
{"composition":75,"lighting":70,"color":65,"focus":80,"overall":73,"feedback":"Your feedback here."}` }
        ]
      }]
    })
  });
  const data = await response.json();
  const text = data.content?.[0]?.text || '{}';
  try {
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    return { score: parsed.overall || 70, composition: parsed.composition || 70, lighting: parsed.lighting || 70, color: parsed.color || 70, focus: parsed.focus || 70, feedback: parsed.feedback || 'Great shot!' };
  } catch {
    return { score: 70, composition: 70, lighting: 70, color: 70, focus: 70, feedback: 'Nice photo! Keep shooting.' };
  }
}

function loadMore() { loadFeed(true); }

function closeScoreToast() { document.getElementById('scoreToast').classList.remove('show'); }

async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function getTimeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
