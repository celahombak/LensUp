<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#00B4D8"/>
  <!-- Camera body -->
  <rect x="12" y="22" width="40" height="28" rx="5" ry="5" fill="white" opacity="0.95"/>
  <!-- Viewfinder bump -->
  <rect x="22" y="17" width="12" height="7" rx="3" ry="3" fill="white" opacity="0.95"/>
  <!-- Lens outer ring -->
  <circle cx="32" cy="36" r="10" fill="#00B4D8"/>
  <!-- Lens inner -->
  <circle cx="32" cy="36" r="7" fill="#0096B4"/>
  <!-- Lens shine -->
  <circle cx="29" cy="33" r="2.5" fill="white" opacity="0.4"/>
  <!-- Flash dot -->
  <circle cx="44" cy="27" r="2.5" fill="#00B4D8"/>
</svg>
