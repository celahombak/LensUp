<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LensUp — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    :root {
      --sky: #00B4D8; --sky-dark: #0096B4; --sky-light: #90E0EF; --sky-pale: #EAF8FC; --sky-xpale: #F4FCFE;
      --teal: #1A936F; --teal-pale: #E8F6F1;
      --coral: #FF6B6B; --coral-pale: #FFF0F0;
      --yellow: #FFD166;
      --bg: #FAFCFE; --surface: #FFFFFF; --surface2: #F4F8FA;
      --text: #1A2B3C; --text-mid: #5A7080; --text-light: #9BB0BC;
      --border: rgba(0,180,216,0.15);
      --border-input: #D4E8F0;
      --shadow-sm: 0 2px 8px rgba(0,100,140,0.08);
      --shadow-md: 0 8px 24px rgba(0,100,140,0.12);
      --shadow-lg: 0 20px 60px rgba(0,100,140,0.15);
      --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px;
      --error: #EF4444; --error-pale: #FEF2F2;
      --success: #1A936F; --success-pale: #E8F6F1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 400;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }

    /* Back link */
    .back-link {
      position: fixed; top: 1.2rem; left: 1.5rem;
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.82rem; font-weight: 600; color: var(--text-mid);
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: var(--sky); }

    /* Card */
    .auth-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2.5rem 2.2rem;
      width: 100%; max-width: 420px;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    /* Logo */
    .auth-logo {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.4rem;
      color: var(--sky); text-decoration: none; margin-bottom: 1.8rem;
    }
    .auth-logo-icon { font-size: 1.3rem; }

    /* Header */
    .auth-title {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: 1.7rem; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 0.3rem; text-align: center;
    }
    .auth-sub {
      font-size: 0.88rem; color: var(--text-mid);
      text-align: center; margin-bottom: 1.8rem; line-height: 1.6;
    }

    /* Alert */
    .alert {
      display: none; padding: 0.75rem 1rem;
      border-radius: var(--radius-sm); font-size: 0.82rem;
      line-height: 1.5; margin-bottom: 1.2rem;
      border: 1.5px solid;
    }
    .alert.show { display: flex; align-items: flex-start; gap: 0.5rem; }
    .alert-error { background: var(--error-pale); border-color: rgba(239,68,68,0.3); color: #B91C1C; }
    .alert-success { background: var(--success-pale); border-color: rgba(26,147,111,0.3); color: var(--teal); }

    /* Form */
    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--text-mid); margin-bottom: 0.4rem;
    }
    .form-input {
      width: 100%; background: var(--surface2);
      border: 1.5px solid var(--border-input);
      color: var(--text); padding: 0.8rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      border-radius: var(--radius-sm); outline: none;
      transition: all 0.2s;
    }
    .form-input:focus { border-color: var(--sky); background: var(--surface); box-shadow: 0 0 0 3px rgba(0,180,216,0.12); }
    .form-input::placeholder { color: var(--text-light); }
    .form-input.error { border-color: var(--error); background: var(--error-pale); }

    /* Password row */
    .password-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
    .forgot-link { font-size: 0.78rem; font-weight: 600; color: var(--sky); text-decoration: none; transition: color 0.2s; }
    .forgot-link:hover { color: var(--sky-dark); }

    /* Strength bar */
    .strength-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 0.5rem; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
    .strength-label { font-size: 0.72rem; color: var(--text-light); margin-top: 0.3rem; }

    /* Submit button */
    .btn-submit {
      width: 100%; background: var(--sky); color: #fff;
      border: none; padding: 0.9rem;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem;
      border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.2s; margin-top: 0.5rem;
      box-shadow: 0 4px 14px rgba(0,180,216,0.35);
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn-submit:hover:not(:disabled) { background: var(--sky-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,180,216,0.45); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-submit .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .auth-divider { text-align: center; margin: 1.4rem 0; font-size: 0.78rem; color: var(--text-light); position: relative; }
    .auth-divider::before, .auth-divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }

    /* Footer link */
    .auth-footer { text-align: center; margin-top: 1.4rem; font-size: 0.85rem; color: var(--text-mid); }
    .auth-footer a { color: var(--sky); font-weight: 700; text-decoration: none; }
    .auth-footer a:hover { color: var(--sky-dark); }

    /* Progress bubbles (decorative, shows what awaits) */
    .auth-chapter-preview {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .mini-bubble {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.62rem;
    }
    .mb-done { background: var(--teal); color: #fff; }
    .mb-active { background: var(--sky); color: #fff; }
    .mb-next { background: var(--surface2); color: var(--text-light); border: 1.5px solid var(--border); }
    .mini-dots { color: var(--text-light); font-size: 0.8rem; letter-spacing: 0.1em; }

    @media (max-width: 480px) {
      .auth-card { padding: 2rem 1.4rem; border-radius: var(--radius-md); }
    }
  </style>
</head>
<body>

<a href="index.html" class="back-link">← Back</a>

<div class="auth-card">

  <a href="index.html" class="auth-logo">
    <span class="auth-logo-icon">📷</span> LensUp
  </a>

  <!-- Decorative chapter bubbles — shows progress waiting for them -->
  <div class="auth-chapter-preview">
    <div class="mini-bubble mb-done">✓</div>
    <div class="mini-bubble mb-done">✓</div>
    <div class="mini-bubble mb-active">3</div>
    <div class="mini-bubble mb-next">4</div>
    <div class="mini-bubble mb-next">5</div>
    <span class="mini-dots">···</span>
  </div>

  <div class="auth-title">Welcome back 👋</div>
  <div class="auth-sub">Continue your learning journey</div>

  <div class="alert alert-error" id="errorAlert"></div>
  <div class="alert alert-success" id="successAlert"></div>

  <div class="form-group">
    <label class="form-label" for="emailInput">Email address</label>
    <input type="email" class="form-input" id="emailInput" placeholder="you@example.com" autocomplete="email"/>
  </div>

  <div class="form-group">
    <div class="password-header">
      <label class="form-label" for="passwordInput" style="margin-bottom:0">Password</label>
      <a href="reset-password.html" class="forgot-link">Forgot password?</a>
    </div>
    <input type="password" class="form-input" id="passwordInput" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter') signIn()"/>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="signIn()">
    <div class="spinner"></div>
    <span class="btn-text">Sign In →</span>
  </button>

  <div class="auth-footer">
    No account yet? <a href="register.html">Create one free →</a>
  </div>

</div>

<script>
  initSupabase();
  (async () => {
    try { const user = await getUser(); if (user) window.location.href = 'learn.html'; } catch(e) {}
  })();

  function showError(msg) {
    const el = document.getElementById('errorAlert');
    el.textContent = '⚠️ ' + msg; el.classList.add('show');
    document.getElementById('successAlert').classList.remove('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('successAlert');
    el.textContent = '✓ ' + msg; el.classList.add('show');
    document.getElementById('errorAlert').classList.remove('show');
  }

  async function signIn() {
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn      = document.getElementById('submitBtn');
    if (!email || !password) { showError('Please enter your email and password.'); return; }
    btn.disabled = true; btn.classList.add('loading');
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showError(error.message || 'Sign in failed. Check your credentials.');
      btn.disabled = false; btn.classList.remove('loading');
    } else {
      showSuccess('Signed in! Loading your chapters…');
      setTimeout(() => window.location.href = 'learn.html', 800);
    }
  }
</script>
</body>
</html>
