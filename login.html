<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LensUp — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --white: #f5f2ee; --gold: #c9a96e;
      --gold-light: #e8d5b0; --dark: #1a1714; --dark2: #141210;
      --mid: #6b6560; --border: rgba(201,169,110,0.15);
    }
    html, body { height: 100%; }
    body {
      background: var(--black); color: var(--white);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem; border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: var(--gold); text-decoration: none; }
    .nav-logo span { color: var(--white); }
    .nav-link { font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(245,242,238,0.5); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--gold); }

    /* ── LAYOUT ── */
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--dark); border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    /* ── CARD HEADER ── */
    .auth-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .auth-logo { font-size: 2rem; margin-bottom: 0.8rem; }
    .auth-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 900; margin-bottom: 0.3rem;
    }
    .auth-header h1 em { font-style: italic; color: var(--gold); }
    .auth-header p { font-size: 0.85rem; color: rgba(245,242,238,0.45); }

    /* ── FORM ── */
    .auth-body { padding: 1.8rem 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: block; font-size: 0.75rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .form-input {
      width: 100%; background: var(--black); border: 1px solid var(--border);
      color: var(--white); padding: 0.8rem 1rem;
      border-radius: 2px; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: rgba(245,242,238,0.2); }

    .btn-submit {
      width: 100%; background: var(--gold); color: var(--black);
      border: none; padding: 0.9rem; border-radius: 2px;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
    }
    .btn-submit:hover:not(:disabled) { background: var(--gold-light); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-footer {
      text-align: center; margin-top: 1.2rem;
      font-size: 0.82rem; color: rgba(245,242,238,0.4);
    }
    .form-footer a { color: var(--gold); text-decoration: none; }
    .form-footer a:hover { text-decoration: underline; }

    .forgot-link {
      display: block; text-align: right; font-size: 0.75rem;
      color: rgba(245,242,238,0.35); text-decoration: none;
      margin-top: 0.3rem; transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--gold); }

    /* ── ERROR / SUCCESS ── */
    .alert {
      padding: 0.8rem 1rem; border-radius: 2px;
      font-size: 0.82rem; line-height: 1.5; margin-bottom: 1.2rem;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: rgba(200,80,80,0.1); border: 1px solid rgba(200,80,80,0.25); color: #f08080; }
    .alert-success { background: rgba(126,207,126,0.08); border: 1px solid rgba(126,207,126,0.2); color: #7ecf7e; }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.2rem 0; color: rgba(245,242,238,0.2); font-size: 0.75rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── GUEST LINK ── */
    .btn-guest {
      width: 100%; background: none; border: 1px solid var(--border);
      color: rgba(245,242,238,0.6); padding: 0.8rem;
      border-radius: 2px; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      display: block; text-align: center;
    }
    .btn-guest:hover { border-color: rgba(201,169,110,0.35); color: var(--white); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 480px) { nav { padding: 1rem 1.2rem; } .auth-body { padding: 1.4rem; } .auth-header { padding: 1.5rem 1.4rem 1.2rem; } }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Lens<span>Up</span></a>
    <a href="register.html" class="nav-link">Create Account →</a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-logo">📷</div>
        <h1>Welcome <em>Back</em></h1>
        <p>Sign in to access your gallery and analysis history</p>
      </div>

      <div class="auth-body">

        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="emailInput" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="passwordInput" placeholder="Your password"
            onkeydown="if(event.key==='Enter') signIn()" />
          <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="signIn()">Sign In</button>

        <div class="form-footer">
          Don't have an account? <a href="register.html">Create one — invite required</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    initSupabase();

    // Redirect if already logged in
    (async () => {
      const user = await getUser();
      if (user) window.location.href = 'app.html';
    })();

    function showError(msg) {
      const el = document.getElementById('errorAlert');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('successAlert').classList.remove('show');
    }
    function showSuccess(msg) {
      const el = document.getElementById('successAlert');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('errorAlert').classList.remove('show');
    }
    function clearAlerts() {
      document.getElementById('errorAlert').classList.remove('show');
      document.getElementById('successAlert').classList.remove('show');
    }

    async function signIn() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const btn = document.getElementById('submitBtn');

      if (!email || !password) { showError('Please enter your email and password.'); return; }

      clearAlerts();
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message || 'Sign in failed. Please check your credentials.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        showSuccess('Signed in! Redirecting…');
        setTimeout(() => window.location.href = 'app.html', 800);
      }
    }

    async function forgotPassword() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) { showError('Enter your email address first, then click Forgot Password.'); return; }
      const { error } = await sb.auth.resetPasswordForEmail(email);
      if (error) { showError(error.message); }
      else { showSuccess('Password reset email sent — check your inbox.'); }
    }
  </script>
</body>
</html>
