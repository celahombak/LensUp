<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LensUp — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --white: #f0ede8; --dark: #111010; --dark2: #181615;
      --mid: #5a5550; --border: rgba(255,255,255,0.07);
      --gold: #e8b84b; --gold2: #f5d07a; --red: #ff4444; --green: #00e676;
      --silver: #c0c0c0; --bronze: #cd7f32;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 3rem; border-bottom: 1px solid var(--border); background: rgba(8,8,8,0.97); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px); }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; color: var(--gold); text-decoration: none; }
    .nav-logo span { color: var(--white); }
    .nav-links { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
    .nav-link { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(240,237,232,0.45); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: var(--gold); }

    /* HERO */
    .page-hero { padding: 2.5rem 3rem 2rem; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(232,184,75,0.04) 0%, transparent 60%); position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(232,184,75,0.8) 1px, transparent 1px), linear-gradient(90deg, rgba(232,184,75,0.8) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.025; }
    .hero-inner { position: relative; max-width: 900px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; }
    .page-tag { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .live-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .page-hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 5vw, 4rem); letter-spacing: 0.04em; line-height: 1; margin-bottom: 0.3rem; }
    .page-hero h1 span { color: var(--gold); }
    .page-hero p { color: rgba(240,237,232,0.4); font-size: 0.85rem; }
    .hero-stats { display: flex; gap: 2.5rem; flex-shrink: 0; }
    .hero-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.04em; display: block; line-height: 1; }
    .hero-stat-label { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); margin-top: 0.2rem; }

    /* WRAP */
    .wrap { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem 6rem; }

    /* YOUR RANK BANNER */
    .your-rank-banner { background: rgba(232,184,75,0.06); border: 1px solid rgba(232,184,75,0.2); border-left: 3px solid var(--gold); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 0.8rem; animation: fadeUp 0.4s ease both; }
    .your-rank-banner.hidden { display: none; }
    .your-rank-label { font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.2rem; }
    .your-rank-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.04em; }
    .your-rank-sub { font-size: 0.75rem; color: var(--mid); margin-top: 0.1rem; }
    .btn-shoot { background: var(--gold); color: var(--black); padding: 0.6rem 1.4rem; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.1em; text-decoration: none; transition: all 0.2s; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); flex-shrink: 0; }
    .btn-shoot:hover { background: var(--gold2); }

    /* PODIUM */
    .podium { display: grid; grid-template-columns: 1fr 1.15fr 1fr; gap: 1px; background: var(--border); margin-bottom: 2rem; }
    .podium-card { background: var(--dark); padding: 2rem 1.2rem; text-align: center; position: relative; transition: background 0.2s; }
    .podium-card:hover { background: var(--dark2); }
    .podium-card.p1 { background: linear-gradient(180deg, rgba(232,184,75,0.07) 0%, var(--dark) 60%); border-top: 3px solid var(--gold); }
    .podium-card.p2 { border-top: 3px solid rgba(192,192,192,0.4); }
    .podium-card.p3 { border-top: 3px solid rgba(205,127,50,0.4); }
    .podium-medal { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
    .podium-avatar { width: 48px; height: 48px; background: var(--dark2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin: 0 auto 0.8rem; border: 2px solid var(--border); }
    .podium-card.p1 .podium-avatar { border-color: rgba(232,184,75,0.4); }
    .podium-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podium-score { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.04em; line-height: 1; }
    .podium-card.p1 .podium-score { color: var(--gold); }
    .podium-card.p2 .podium-score { color: var(--silver); }
    .podium-card.p3 .podium-score { color: var(--bronze); }
    .podium-denom { font-size: 0.85rem; color: var(--mid); }
    .podium-meta { font-size: 0.68rem; color: var(--mid); margin-top: 0.4rem; }
    .podium-you { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); background: rgba(232,184,75,0.12); padding: 0.15rem 0.5rem; margin-left: 0.3rem; }

    /* TABLE */
    .table-wrap { background: var(--dark); border: 1px solid var(--border); overflow: hidden; }
    .table-toolbar { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .table-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: var(--gold); }
    .table-right { display: flex; align-items: center; gap: 1rem; }
    .last-updated { font-size: 0.68rem; color: var(--mid); }
    .btn-refresh { background: none; border: 1px solid var(--border); color: var(--mid); padding: 0.35rem 0.8rem; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .btn-refresh:hover { border-color: var(--gold); color: var(--gold); }

    .col-header { display: grid; grid-template-columns: 52px 1fr 80px 80px 70px; gap: 1rem; padding: 0.6rem 1.5rem; background: var(--dark2); border-bottom: 1px solid var(--border); }
    .col-h { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); text-align: center; }
    .col-h:nth-child(2) { text-align: left; }

    .lb-row { display: grid; grid-template-columns: 52px 1fr 80px 80px 70px; align-items: center; gap: 1rem; padding: 0.9rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.15s; animation: fadeUp 0.3s ease both; }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(232,184,75,0.03); }
    .lb-row.is-you { background: rgba(232,184,75,0.05); border-left: 2px solid var(--gold); }

    .lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; text-align: center; color: var(--mid); }
    .lb-rank.r1 { color: var(--gold); }
    .lb-rank.r2 { color: var(--silver); }
    .lb-rank.r3 { color: var(--bronze); }

    .lb-user { display: flex; align-items: center; gap: 0.8rem; min-width: 0; }
    .lb-avatar { font-size: 1.3rem; flex-shrink: 0; }
    .lb-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-you-tag { font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); background: rgba(232,184,75,0.12); padding: 0.12rem 0.45rem; margin-left: 0.35rem; vertical-align: middle; }

    .lb-best { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--gold); text-align: center; }
    .lb-avg { font-size: 0.82rem; color: rgba(240,237,232,0.45); text-align: center; }
    .lb-total { font-size: 0.75rem; color: var(--mid); text-align: center; }

    /* LOADING / EMPTY */
    .lb-loading { text-align: center; padding: 4rem 2rem; color: rgba(240,237,232,0.3); font-size: 0.85rem; }
    .lb-spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    .lb-empty { text-align: center; padding: 4rem 2rem; color: rgba(240,237,232,0.3); font-size: 0.85rem; line-height: 2; }
    .lb-error { text-align: center; padding: 3rem 2rem; color: #ff8080; font-size: 0.82rem; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      nav { padding: 1rem 1.2rem; }
      .page-hero { padding: 2rem 1.2rem 1.5rem; }
      .wrap { padding: 1.5rem 1rem 4rem; }
      .hero-stats { display: none; }
      .podium { grid-template-columns: 1fr; }
      .lb-row, .col-header { grid-template-columns: 40px 1fr 60px 60px; }
      .lb-total, .col-h:last-child { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Lens<span>Up</span></a>
    <div class="nav-links">
      <a href="leaderboard.html" class="nav-link active">🏆 Leaderboard</a>
      <a href="learn.html" class="nav-link">Learn</a>
      <a href="app.html" class="nav-link">Analyse</a>
      <a href="gallery.html" class="nav-link">Gallery</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <span id="navAuthArea"></span>
    </div>
  </nav>

  <!-- HERO -->
  <div class="page-hero">
    <div class="hero-inner">
      <div>
        <div class="page-tag"><span class="live-dot"></span> Updated Live</div>
        <h1>The <span>Leaderboard</span></h1>
        <p>Ranked by best single score · Avg used as tiebreaker</p>
      </div>
      <div class="hero-stats">
        <div>
          <span class="hero-stat-num" id="heroTotal" style="color:var(--gold)">—</span>
          <div class="hero-stat-label">Photographers</div>
        </div>
        <div>
          <span class="hero-stat-num" id="heroTopScore" style="color:var(--green)">—</span>
          <div class="hero-stat-label">Top Score</div>
        </div>
      </div>
    </div>
  </div>

  <div class="wrap">

    <!-- YOUR RANK -->
    <div class="your-rank-banner hidden" id="yourRankBanner">
      <div>
        <div class="your-rank-label">Your Current Rank</div>
        <div class="your-rank-val" id="yourRankVal">—</div>
        <div class="your-rank-sub" id="yourRankSub"></div>
      </div>
      <a href="app.html" class="btn-shoot">📷 Submit a Shot</a>
    </div>

    <!-- PODIUM -->
    <div class="podium" id="podium"></div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-toolbar">
        <span class="table-title">All Rankings</span>
        <div class="table-right">
          <span class="last-updated" id="lastUpdated"></span>
          <button class="btn-refresh" onclick="loadLeaderboard()">↻ Refresh</button>
        </div>
      </div>
      <div class="col-header">
        <div class="col-h">#</div>
        <div class="col-h">Photographer</div>
        <div class="col-h">Best</div>
        <div class="col-h">Avg</div>
        <div class="col-h">Shots</div>
      </div>
      <div id="lbBody">
        <div class="lb-loading"><div class="lb-spinner"></div>Loading rankings…</div>
      </div>
    </div>

  </div>

  <script>
    let currentUser = null;

    function renderNavAuth() {
      const area = document.getElementById('navAuthArea');
      const name = currentUser.user_metadata?.display_name || currentUser.email.split('@')[0];
      area.innerHTML = `
        <span style="font-size:0.72rem;color:rgba(240,237,232,0.35);">Hi, ${name}</span>
        <button onclick="signOut()" style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(240,237,232,0.35);background:none;border:none;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;" onmouseover="this.style.color='#e8b84b'" onmouseout="this.style.color='rgba(240,237,232,0.35)'">Sign Out</button>
      `;
    }

    async function loadLeaderboard() {
      document.getElementById('lbBody').innerHTML = `<div class="lb-loading"><div class="lb-spinner"></div>Loading rankings…</div>`;
      document.getElementById('podium').innerHTML = '';

      try {
        // Query analyses directly — group by user to get best/avg/total
        const { data: rows, error } = await sb
          .from('analyses')
          .select('user_id, overall')
          .order('overall', { ascending: false });

        if (error) throw error;

        if (!rows || rows.length === 0) {
          document.getElementById('lbBody').innerHTML = `<div class="lb-empty">No submissions yet.<br/>Be the first to post a score! 📷<br/><br/><a href="app.html" style="color:var(--gold)">Submit your shot →</a></div>`;
          return;
        }

        // Group by user_id
        const userMap = {};
        for (const row of rows) {
          const uid = row.user_id;
          if (!userMap[uid]) userMap[uid] = { user_id: uid, scores: [] };
          userMap[uid].scores.push(row.overall);
        }

        // Fetch display names from profiles (or auth metadata)
        const userIds = Object.keys(userMap);
        const { data: profiles } = await sb
          .from('profiles')
          .select('id, display_name, avatar')
          .in('id', userIds);

        const profileMap = {};
        if (profiles) profiles.forEach(p => profileMap[p.id] = p);

        // Build ranked list
        const ranked = Object.values(userMap).map(u => {
          const scores = u.scores;
          const best = Math.max(...scores);
          const avg  = (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(1);
          const profile = profileMap[u.user_id] || {};
          return {
            id: u.user_id,
            name: profile.display_name || 'Anonymous',
            avatar: profile.avatar || '📷',
            best,
            avg: parseFloat(avg),
            total: scores.length
          };
        }).sort((a,b) => b.best - a.best || b.avg - a.avg);

        // Hero stats
        document.getElementById('heroTotal').textContent = ranked.length;
        document.getElementById('heroTopScore').textContent = ranked[0]?.best ?? '—';

        renderPodium(ranked.slice(0, 3));
        renderTable(ranked);

        // Your rank
        if (currentUser) {
          const myIdx = ranked.findIndex(p => p.id === currentUser.id);
          if (myIdx !== -1) {
            const me = ranked[myIdx];
            document.getElementById('yourRankBanner').classList.remove('hidden');
            document.getElementById('yourRankVal').textContent = `#${myIdx + 1} of ${ranked.length}`;
            document.getElementById('yourRankSub').textContent = `Best: ${me.best}/10 · Avg: ${me.avg} · ${me.total} shot${me.total !== 1 ? 's' : ''}`;
          }
        }

        document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();

      } catch(err) {
        console.error('Leaderboard error:', err);
        document.getElementById('lbBody').innerHTML = `<div class="lb-error">Failed to load leaderboard. Please try again.<br/><br/><button onclick="loadLeaderboard()" style="color:var(--gold);background:none;border:1px solid var(--gold);padding:0.5rem 1rem;cursor:pointer;font-family:'DM Sans',sans-serif;">Retry</button></div>`;
      }
    }

    function renderPodium(top) {
      if (!top.length) return;
      const medals = ['🥇','🥈','🥉'];
      const cls    = ['p1','p2','p3'];
      // Visual order: 2nd left, 1st centre, 3rd right
      const visual = top.length >= 3 ? [1,0,2] : top.length === 2 ? [1,0] : [0];

      document.getElementById('podium').innerHTML = visual.map(ri => {
        const p = top[ri];
        if (!p) return '';
        const isYou = currentUser && p.id === currentUser.id;
        return `
          <div class="podium-card ${cls[ri]}">
            <span class="podium-medal">${medals[ri]}</span>
            <div class="podium-avatar">${p.avatar}</div>
            <div class="podium-name">${p.name}${isYou ? '<span class="podium-you">you</span>' : ''}</div>
            <div class="podium-score">${p.best}<span class="podium-denom">/10</span></div>
            <div class="podium-meta">${p.total} shot${p.total !== 1 ? 's' : ''} · avg ${p.avg}</div>
          </div>
        `;
      }).join('');
    }

    function renderTable(ranked) {
      const rankCls = ['r1','r2','r3'];
      document.getElementById('lbBody').innerHTML = ranked.map((p, i) => {
        const isYou = currentUser && p.id === currentUser.id;
        return `
          <div class="lb-row ${isYou ? 'is-you' : ''}" style="animation-delay:${i * 0.03}s">
            <div class="lb-rank ${rankCls[i] || ''}">${i + 1}</div>
            <div class="lb-user">
              <span class="lb-avatar">${p.avatar}</span>
              <span class="lb-name">${p.name}${isYou ? '<span class="lb-you-tag">you</span>' : ''}</span>
            </div>
            <div class="lb-best">${p.best}</div>
            <div class="lb-avg">${p.avg}</div>
            <div class="lb-total">${p.total}</div>
          </div>
        `;
      }).join('');
    }

    async function init() {
      try {
        initSupabase();
        await new Promise(r => setTimeout(r, 200));
        currentUser = await getUser();
        if (currentUser) renderNavAuth();
      } catch(e) {}
      await loadLeaderboard();
    }

    init();
  </script>
</body>
</html>
