<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LensUp — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    :root {
      --cream: #FAF7F2;
      --warm-white: #FDF9F4;
      --terracotta: #C4622D;
      --terracotta-light: #E8845A;
      --terracotta-pale: #F5E6DE;
      --brown: #6B3A2A;
      --text-dark: #2C1810;
      --text-mid: #7A5C4F;
      --text-light: #B09080;
      --border: #E8DDD5;
      --success: #4CAF50;
      --gold: #D4A853;
      --silver: #A0A0A0;
      --bronze: #CD7F32;
      --nav-h: 64px;
      --bottom-nav-h: 68px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      padding-bottom: calc(var(--bottom-nav-h) + 20px);
    }

    .top-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--warm-white); border-bottom: 1px solid var(--border);
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .nav-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--terracotta); }
    .nav-title { font-size: 15px; font-weight: 600; color: var(--text-dark); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: var(--bottom-nav-h); background: var(--warm-white);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: var(--text-light);
      font-size: 10px; font-weight: 500; padding: 8px 14px; transition: color 0.2s;
    }
    .nav-item.active { color: var(--terracotta); }
    .nav-item svg { width: 22px; height: 22px; }

    .main { max-width: 480px; margin: 0 auto; }

    /* PODIUM */
    .podium-section {
      background: linear-gradient(160deg, var(--terracotta) 0%, var(--brown) 100%);
      padding: 24px 20px 32px; position: relative; overflow: hidden;
    }
    .podium-section::after {
      content: '🏆';
      position: absolute; right: 20px; top: 20px;
      font-size: 60px; opacity: 0.1;
    }
    .podium-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.65);
      margin-bottom: 20px; text-align: center;
    }
    .podium-row {
      display: flex; align-items: flex-end; justify-content: center; gap: 10px;
    }
    .podium-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      flex: 1; max-width: 100px;
    }
    .podium-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: white; overflow: hidden;
    }
    .podium-avatar.gold { border-color: var(--gold); background: rgba(212,168,83,0.3); }
    .podium-avatar.silver { border-color: var(--silver); background: rgba(160,160,160,0.3); }
    .podium-avatar.bronze { border-color: var(--bronze); background: rgba(205,127,50,0.3); }
    .podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .podium-name {
      font-size: 11px; font-weight: 600; color: white;
      text-align: center; max-width: 80px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .podium-score { font-size: 12px; color: rgba(255,255,255,0.75); }
    .podium-block {
      border-radius: 8px 8px 0 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.9);
    }
    .podium-block.first { background: rgba(212,168,83,0.5); height: 56px; }
    .podium-block.second { background: rgba(255,255,255,0.15); height: 40px; }
    .podium-block.third { background: rgba(205,127,50,0.35); height: 30px; }

    /* TABS */
    .tabs-bar {
      background: var(--warm-white); border-bottom: 1px solid var(--border);
      display: flex; padding: 0 16px; position: sticky; top: var(--nav-h); z-index: 90;
    }
    .tab-btn {
      flex: 1; padding: 14px 4px;
      border: none; background: transparent; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 600; color: var(--text-light);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; white-space: nowrap;
    }
    .tab-btn.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }

    /* CONTENT */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* RANK ROW */
    .rank-row {
      display: flex; align-items: center; gap: 12px;
      background: white; border: 1.5px solid var(--border);
      border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
      transition: all 0.2s;
    }
    .rank-row:hover { border-color: var(--terracotta-light); }
    .rank-row.mine { border-color: var(--terracotta); background: var(--terracotta-pale); }

    .rank-pos {
      width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
    }
    .pos-1 { background: #FFF8DC; color: #8B6914; border: 2px solid var(--gold); }
    .pos-2 { background: #F5F5F5; color: #666; border: 2px solid var(--silver); }
    .pos-3 { background: #FFF0E0; color: #8B4513; border: 2px solid var(--bronze); }
    .pos-other { background: var(--cream); color: var(--text-light); border: 1.5px solid var(--border); }

    .rank-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: var(--terracotta-pale);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--terracotta); overflow: hidden;
    }
    .rank-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 14px; font-weight: 600; color: var(--text-dark); }
    .rank-sub { font-size: 11px; color: var(--text-light); margin-top: 1px; }

    .rank-value { text-align: right; flex-shrink: 0; }
    .rank-main { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--terracotta); }
    .rank-main.gold { color: var(--gold); }
    .rank-label { font-size: 10px; color: var(--text-light); }

    /* CHAPTER COMPLETION CARD */
    .chapter-comp-row {
      background: white; border: 1.5px solid var(--border);
      border-radius: 14px; padding: 13px 14px; margin-bottom: 10px;
    }
    .chapter-comp-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .chapter-comp-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--terracotta-pale); border: 1.5px solid var(--terracotta-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--terracotta); flex-shrink: 0;
    }
    .chapter-comp-user { flex: 1; }
    .chapter-comp-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .chapter-comp-time { font-size: 11px; color: var(--text-light); }
    .chapter-comp-chapter {
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      color: var(--terracotta); text-transform: uppercase;
    }

    /* Scorecard mini */
    .scorecard-mini {
      background: var(--cream); border-radius: 10px; padding: 10px 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .scorecard-mini-num {
      font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--terracotta);
      flex-shrink: 0;
    }
    .scorecard-mini-bars { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .mini-bar-row { display: flex; align-items: center; gap: 6px; }
    .mini-bar-label { font-size: 10px; color: var(--text-light); width: 60px; flex-shrink: 0; }
    .mini-bar-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .mini-bar-fill { height: 100%; background: var(--terracotta); border-radius: 3px; }

    /* My position banner */
    .my-position-banner {
      background: var(--terracotta-pale); border: 1.5px solid var(--terracotta-light);
      border-radius: 14px; padding: 12px 14px; margin-bottom: 16px;
      display: none; align-items: center; justify-content: space-between;
    }
    .my-position-banner.show { display: flex; }
    .my-pos-label { font-size: 13px; color: var(--terracotta); font-weight: 600; }
    .my-pos-rank { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--terracotta); }

    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--text-light); font-size: 14px;
    }
    .empty-state-icon { font-size: 36px; margin-bottom: 10px; }

    .auth-gate {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: var(--cream); flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px; text-align: center;
    }
    .auth-gate.open { display: flex; }
    .auth-gate h2 { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 10px; }
    .auth-gate p { color: var(--text-mid); margin-bottom: 30px; }
    .auth-gate a {
      background: var(--terracotta); color: white; padding: 15px 40px;
      border-radius: 14px; text-decoration: none; font-weight: 600; font-size: 16px;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .rank-row, .chapter-comp-row { animation: fadeUp 0.3s ease both; }
  </style>
</head>
<body>

<nav class="top-nav">
  <span class="nav-logo">LensUp</span>
  <span class="nav-title">Leaderboard</span>
  <span style="width:60px"></span>
</nav>

<!-- PODIUM -->
<div class="podium-section" id="podiumSection">
  <div class="podium-label">Top Photographers</div>
  <div class="podium-row" id="podiumRow">
    <!-- populated by JS -->
  </div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('uploads')">Most Uploads</button>
  <button class="tab-btn" onclick="switchTab('score')">Best Score</button>
  <button class="tab-btn" onclick="switchTab('chapters')">Chapter Wins</button>
</div>

<div class="main">

  <!-- TAB: MOST UPLOADS -->
  <div class="tab-content active" id="tab-uploads">
    <div class="my-position-banner" id="myPosBanner-uploads">
      <span class="my-pos-label">Your rank</span>
      <span class="my-pos-rank" id="myRank-uploads">—</span>
    </div>
    <div id="list-uploads"></div>
  </div>

  <!-- TAB: BEST SCORE -->
  <div class="tab-content" id="tab-score">
    <div class="my-position-banner" id="myPosBanner-score">
      <span class="my-pos-label">Your rank</span>
      <span class="my-pos-rank" id="myRank-score">—</span>
    </div>
    <div id="list-score"></div>
  </div>

  <!-- TAB: CHAPTER COMPLETIONS -->
  <div class="tab-content" id="tab-chapters">
    <div id="list-chapters"></div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Home
  </a>
  <a href="learn.html" class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>

  </a>
  <a href="feed.html" class="nav-item">

    Feed

    Profile
  </a>
</nav>

<div class="auth-gate" id="authGate">
  <div style="font-size:48px;margin-bottom:16px">🏅</div>
  <h2>Sign in to see rankings</h2>
  <p>Compete with photographers worldwide</p>
  <a href="index.html">Get Started</a>
</div>

<script>
initSupabase();

const CHAPTER_NAMES = ["Rule of Thirds","Leading Lines","Framing","Symmetry & Patterns","Negative Space","Depth of Field","Golden Hour Light","Blue Hour & Night","Natural Light Indoors","Colour Theory","Black & White","Shadows & Silhouettes","Portrait Basics","Street Photography","Environmental Portraits","Architecture","Urban Geometry","Landscapes","Macro & Close-Up","Reflections","Motion & Long Exposure","Storytelling","Flat Lay & Product","Perspective & POV","Texture","Still Life","Food Photography","Nature & Plants","Editing Fundamentals","Colour Grading","Aspect Ratios & Crop","Mood & Emotion","Documentary","Abstract Photography","Photo Essay","Your Signature Style"];

let currentUser = null;
let profileCache = {};
let activeTab = 'uploads';

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { document.getElementById('authGate').classList.add('open'); return; }
  currentUser = session.user;

  await Promise.all([
    loadUploadsTab(),
    loadScoreTab(),
    loadChaptersTab()
  ]);
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['uploads','score','chapters'];
    btn.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── FETCH ALL ANALYSES ──
async function fetchAnalyses() {
  const { data } = await sb
    .from('analyses')
    .select('user_id, score, composition_score, lighting_score, color_score, focus_score, source, chapter_id, created_at')
    .in('source', ['feed', 'challenge', 'learn']);
  return data || [];
}

async function fetchProfiles(uids) {
  const missing = uids.filter(id => !profileCache[id]);
  if (missing.length > 0) {
    const { data } = await sb.from('profiles').select('id, display_name, avatar_url').in('id', missing);
    (data || []).forEach(p => { profileCache[p.id] = p; });
  }
}

function getProfile(uid) {
  const p = profileCache[uid] || {};
  return {
    name: p.display_name || 'Photographer',
    avatar: p.avatar_url || null,
    initials: (p.display_name || 'P').charAt(0).toUpperCase()
  };
}

function avatarHtml(uid, cls = 'rank-avatar') {
  const p = getProfile(uid);
  return p.avatar
    ? `<div class="${cls}"><img src="${p.avatar}" /></div>`
    : `<div class="${cls}">${p.initials}</div>`;
}

function posClass(i) {
  return ['pos-1','pos-2','pos-3'][i] || 'pos-other';
}
function medal(i) {
  return ['🥇','🥈','🥉'][i] || (i + 1);
}

// ── TAB 1: MOST UPLOADS ──
async function loadUploadsTab() {
  const all = await fetchAnalyses();
  const feedOnly = all.filter(a => a.source === 'feed' || a.source === 'challenge');

  const counts = {};
  feedOnly.forEach(a => { counts[a.user_id] = (counts[a.user_id] || 0) + 1; });

  const ranked = Object.entries(counts)
    .map(([uid, count]) => ({ uid, count }))
    .sort((a, b) => b.count - a.count);

  await fetchProfiles(ranked.map(r => r.uid));
  renderPodium(ranked.slice(0, 3), r => r.count, r => `${r.count} photos`);

  const myRank = ranked.findIndex(r => r.uid === currentUser.id) + 1;
  if (myRank > 0) {
    document.getElementById('myRank-uploads').textContent = `#${myRank}`;
    document.getElementById('myPosBanner-uploads').classList.add('show');
  }

  const container = document.getElementById('list-uploads');
  if (ranked.length === 0) {
    container.innerHTML = emptyState('No uploads yet', 'Be the first to post a photo!');
    return;
  }

  container.innerHTML = ranked.map((r, i) => {
    const p = getProfile(r.uid);
    const isMe = r.uid === currentUser.id;
    return `
      <div class="rank-row ${isMe ? 'mine' : ''}">
        <div class="rank-pos ${posClass(i)}">${medal(i)}</div>
        ${avatarHtml(r.uid)}
        <div class="rank-info">
          <div class="rank-name">${escHtml(p.name)}${isMe ? ' <span style="font-size:10px;color:var(--terracotta)">(you)</span>' : ''}</div>
          <div class="rank-sub">${r.count} photo${r.count !== 1 ? 's' : ''} posted</div>
        </div>
        <div class="rank-value">
          <div class="rank-main">${r.count}</div>
          <div class="rank-label">uploads</div>
        </div>
      </div>`;
  }).join('');
}

// ── TAB 2: BEST AVG SCORE ──
async function loadScoreTab() {
  const all = await fetchAnalyses();
  const feedOnly = all.filter(a => (a.source === 'feed' || a.source === 'challenge') && a.score);

  const userScores = {};
  feedOnly.forEach(a => {
    if (!userScores[a.user_id]) userScores[a.user_id] = { total: 0, count: 0, comp: 0, light: 0, color: 0, focus: 0 };
    const u = userScores[a.user_id];
    u.total += a.score; u.count++;
    u.comp += a.composition_score || 0;
    u.light += a.lighting_score || 0;
    u.color += a.color_score || 0;
    u.focus += a.focus_score || 0;
  });

  const ranked = Object.entries(userScores)
    .filter(([, s]) => s.count >= 1)
    .map(([uid, s]) => ({
      uid,
      avg: Math.round(s.total / s.count),
      count: s.count,
      comp: Math.round(s.comp / s.count),
      light: Math.round(s.light / s.count),
      color: Math.round(s.color / s.count),
      focus: Math.round(s.focus / s.count),
    }))
    .sort((a, b) => b.avg - a.avg);

  await fetchProfiles(ranked.map(r => r.uid));
  renderPodium(ranked.slice(0, 3), r => `⭐ ${r.avg}`, r => `${r.count} photos`);

  const myRank = ranked.findIndex(r => r.uid === currentUser.id) + 1;
  if (myRank > 0) {
    document.getElementById('myRank-score').textContent = `#${myRank}`;
    document.getElementById('myPosBanner-score').classList.add('show');
  }

  const container = document.getElementById('list-score');
  if (ranked.length === 0) {
    container.innerHTML = emptyState('No scores yet', 'Submit photos to appear here!');
    return;
  }

  container.innerHTML = ranked.map((r, i) => {
    const p = getProfile(r.uid);
    const isMe = r.uid === currentUser.id;
    return `
      <div class="rank-row ${isMe ? 'mine' : ''}">
        <div class="rank-pos ${posClass(i)}">${medal(i)}</div>
        ${avatarHtml(r.uid)}
        <div class="rank-info">
          <div class="rank-name">${escHtml(p.name)}${isMe ? ' <span style="font-size:10px;color:var(--terracotta)">(you)</span>' : ''}</div>
          <div class="rank-sub">${r.count} photo${r.count !== 1 ? 's' : ''} · ${r.avg >= 80 ? '🔥 Elite' : r.avg >= 65 ? '⬆️ Improving' : '📷 Learning'}</div>
        </div>
        <div class="rank-value">
          <div class="rank-main ${i === 0 ? 'gold' : ''}">${r.avg}</div>
          <div class="rank-label">avg score</div>
        </div>
      </div>
      ${isMe || i < 3 ? `
      <div style="margin:-4px 0 10px;background:white;border:1.5px solid var(--border);border-top:none;border-radius:0 0 14px 14px;padding:10px 14px">
        <div class="scorecard-mini">
          <div class="scorecard-mini-num">${r.avg}</div>
          <div class="scorecard-mini-bars">
            ${[['Composition',r.comp],['Lighting',r.light],['Colour',r.color],['Focus',r.focus]].map(([label,val]) =>
              `<div class="mini-bar-row">
                <div class="mini-bar-label">${label}</div>
                <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${val}%"></div></div>
                <span style="font-size:10px;color:var(--text-mid);width:24px;text-align:right">${val}</span>
              </div>`
            ).join('')}
          </div>
        </div>
      </div>` : ''}`;
  }).join('');
}

// ── TAB 3: CHAPTER COMPLETIONS ──
async function loadChaptersTab() {
  const all = await fetchAnalyses();
  const learnOnly = all.filter(a => a.source === 'learn' && a.chapter_id);

  // Group by user + chapter, count photos
  const map = {};
  learnOnly.forEach(a => {
    const key = `${a.user_id}-${a.chapter_id}`;
    if (!map[key]) map[key] = { uid: a.user_id, chapter: a.chapter_id, count: 0, scores: [], latest: a.created_at };
    map[key].count++;
    if (a.score) map[key].scores.push(a.score);
    if (a.created_at > map[key].latest) map[key].latest = a.created_at;
  });

  // Only completed (3+ photos)
  const completions = Object.values(map)
    .filter(c => c.count >= 3)
    .map(c => ({
      ...c,
      avgScore: c.scores.length ? Math.round(c.scores.reduce((a, b) => a + b, 0) / c.scores.length) : null
    }))
    .sort((a, b) => new Date(b.latest) - new Date(a.latest))
    .slice(0, 30);

  await fetchProfiles(completions.map(c => c.uid));

  const container = document.getElementById('list-chapters');
  if (completions.length === 0) {
    container.innerHTML = emptyState('No completions yet', 'Complete a chapter in Learn to appear here!');
    return;
  }

  container.innerHTML = completions.map(c => {
    const p = getProfile(c.uid);
    const chapterName = CHAPTER_NAMES[c.chapter - 1] || `Chapter ${c.chapter}`;
    const isMe = c.uid === currentUser.id;
    return `
      <div class="chapter-comp-row ${isMe ? 'mine' : ''}">
        <div class="chapter-comp-top">
          <div class="chapter-comp-icon">${c.chapter}</div>
          <div class="chapter-comp-user">
            <div class="chapter-comp-name">${escHtml(p.name)}${isMe ? ' <span style="font-size:10px;color:var(--terracotta)">(you)</span>' : ''}</div>
            <div class="chapter-comp-time">${getTimeAgo(c.latest)}</div>
          </div>
          ${c.avgScore ? `<div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--terracotta)">⭐${c.avgScore}</div>` : ''}
        </div>
        <div class="chapter-comp-chapter">✓ Ch. ${c.chapter} — ${chapterName}</div>
      </div>`;
  }).join('');
}

// ── PODIUM ──
function renderPodium(top3, valueFn, subFn) {
  if (top3.length === 0) {
    document.getElementById('podiumRow').innerHTML = '<div style="color:rgba(255,255,255,0.5);font-size:13px;text-align:center;width:100%;padding:20px">No data yet</div>';
    return;
  }

  const order = top3.length >= 3
    ? [top3[1], top3[0], top3[2]]   // silver, gold, bronze left-to-right
    : top3;
  const actualOrder = top3.length >= 3
    ? [1, 0, 2]
    : [0, 1, 2];

  document.getElementById('podiumRow').innerHTML = order.map((r, idx) => {
    if (!r) return '<div class="podium-item"></div>';
    const realIdx = actualOrder[idx];
    const p = getProfile(r.uid);
    const blockClass = ['second','first','third'][idx];
    const avatarClass = ['silver','gold','bronze'][idx];
    const blockLabel = ['2','1','3'][idx];

    const avatarContent = p.avatar
      ? `<img src="${p.avatar}" />`
      : p.initials;

    return `
      <div class="podium-item">
        <div class="podium-avatar ${avatarClass}">${avatarContent}</div>
        <div class="podium-name">${escHtml(p.name)}</div>
        <div class="podium-score">${valueFn(r)}</div>
        <div class="podium-block ${blockClass}">${blockLabel}</div>
      </div>`;
  }).join('');
}

function emptyState(title, sub) {
  return `<div class="empty-state"><div class="empty-state-icon">📊</div><div style="font-size:15px;font-weight:500;color:var(--text-mid);margin-bottom:4px">${title}</div><div>${sub}</div></div>`;
}

function getTimeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
