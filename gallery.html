<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LensUp — Community Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    body { visibility: visible; }
    body.auth-ready { visibility: visible; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --white: #f0ede8; --dark: #111010; --dark2: #181615;
      --mid: #5a5550; --border: rgba(255,255,255,0.07);
      --gold: #e8b84b; --gold2: #f5d07a; --green: #00e676; --red: #ff4444;
      --c1:#60a5fa; --c2:#f472b6; --c3:#34d399; --c4:#fbbf24; --c5:#a78bfa; --c6:#fb923c;
    }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 3rem; border-bottom: 1px solid var(--border); background: rgba(8,8,8,0.97); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px); }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; color: var(--gold); text-decoration: none; }
    .nav-logo span { color: var(--white); }
    .nav-links { display: flex; align-items: center; gap: 2rem; }
    .nav-link { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(240,237,232,0.45); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: var(--gold); }
    .nav-burger { display: none; background: none; border: none; cursor: pointer; padding: 0.4rem; color: var(--white); flex-direction: column; gap: 5px; align-items: center; justify-content: center; }
    .nav-burger span { display: block; width: 22px; height: 2px; background: var(--white); border-radius: 2px; }

    .mobile-menu { display: none; position: fixed; inset: 0; background: rgba(8,8,8,0.98); z-index: 200; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(16px); }
    .mobile-menu.open { display: flex; }
    .mobile-menu-close { position: absolute; top: 1.2rem; right: 1.5rem; background: none; border: none; color: var(--mid); font-size: 1.5rem; cursor: pointer; }
    .mobile-menu-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); margin-bottom: 2rem; }
    .mobile-menu-logo span { color: var(--white); }
    .mobile-menu a { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.06em; color: rgba(240,237,232,0.55); text-decoration: none; padding: 0.5rem 2rem; transition: color 0.2s; }
    .mobile-menu a:hover, .mobile-menu a.active { color: var(--gold); }
    .mobile-menu-divider { width: 40px; height: 1px; background: var(--border); margin: 0.8rem 0; }
    .mobile-menu-auth { margin-top: 1rem; text-align: center; color: var(--mid); font-size: 0.72rem; }
    .mobile-menu-auth span { color: rgba(240,237,232,0.5); display: block; margin-bottom: 0.6rem; }
    .mobile-menu-signout { background: none; border: 1px solid var(--border); color: var(--mid); padding: 0.5rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
    .mobile-menu-signout:hover { border-color: var(--gold); color: var(--gold); }

    .submit-bar { position: sticky; top: 57px; z-index: 90; background: rgba(8,8,8,0.96); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); padding: 0.8rem 3rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .submit-bar-left { font-size: 0.78rem; color: rgba(240,237,232,0.35); }
    .submit-bar-left strong { color: var(--gold); }
    .btn-post { background: var(--gold); color: var(--black); border: none; padding: 0.6rem 1.4rem; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); white-space: nowrap; }
    .btn-post:hover { background: var(--gold2); }
    .btn-post:disabled { opacity: 0.4; cursor: not-allowed; }

    .feed-wrap { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

    .feed-card { background: var(--dark); border: 1px solid var(--border); margin-bottom: 1.5rem; }
    .feed-card-header { display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1.1rem; }
    .feed-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(232,184,75,0.1); border: 1px solid rgba(232,184,75,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 700; color: var(--gold); flex-shrink: 0; cursor: pointer; }
    .feed-user { flex: 1; min-width: 0; }
    .feed-name { font-size: 0.88rem; font-weight: 600; cursor: pointer; }
    .feed-name:hover { color: var(--gold); }
    .feed-time { font-size: 0.68rem; color: var(--mid); }
    .feed-score-badge { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; flex-shrink: 0; }

    .feed-photo { width: 100%; background: var(--dark2); overflow: hidden; cursor: pointer; }
    .feed-photo img { width: 100%; object-fit: cover; display: block; transition: transform 0.3s; max-height: 480px; }
    .feed-photo:hover img { transform: scale(1.01); }
    .feed-photo-placeholder { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; opacity: 0.1; }

    .feed-summary { padding: 0.6rem 1.1rem 0.2rem; font-size: 0.8rem; line-height: 1.7; color: rgba(240,237,232,0.4); }
    .feed-cats { display: flex; gap: 0.4rem; flex-wrap: wrap; padding: 0.3rem 1.1rem 0.6rem; }
    .feed-cat { font-size: 0.6rem; padding: 0.15rem 0.45rem; border-radius: 10px; border: 1px solid; }
    .feed-actions { display: flex; align-items: center; padding: 0.6rem 1.1rem; border-top: 1px solid var(--border); gap: 0.5rem; }
    .like-btn { display: flex; align-items: center; gap: 0.4rem; background: none; border: 1px solid var(--border); color: rgba(240,237,232,0.45); padding: 0.3rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; border-radius: 20px; }
    .like-btn:hover { border-color: rgba(232,184,75,0.4); color: var(--gold); }
    .like-btn.liked { border-color: rgba(232,184,75,0.5); color: var(--gold); background: rgba(232,184,75,0.06); }
    .detail-btn { margin-left: auto; background: none; border: none; color: rgba(240,237,232,0.3); font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 0.3rem 0.6rem; transition: color 0.2s; }
    .detail-btn:hover { color: var(--gold); }

    .feed-empty { text-align: center; padding: 5rem 2rem; }
    .feed-empty-icon { font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.3; }
    .feed-empty p { color: rgba(240,237,232,0.25); font-size: 0.88rem; }
    .feed-loading { text-align: center; padding: 3rem; }
    .feed-spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-more { display: block; width: 100%; background: none; border: 1px solid var(--border); color: rgba(240,237,232,0.4); padding: 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
    .load-more:hover { border-color: var(--gold); color: var(--gold); }

    /* DETAIL MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; padding: 1rem; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--dark); border: 1px solid var(--border); max-width: 500px; width: 100%; position: relative; max-height: 90vh; overflow-y: auto; }
    .modal-close-btn { position: sticky; top: 0; z-index: 10; background: var(--dark); padding: 0.7rem 1rem; text-align: right; border-bottom: 1px solid var(--border); }
    .modal-close-btn button { background: none; border: none; color: var(--mid); font-size: 1rem; cursor: pointer; padding: 0.2rem 0.5rem; }
    .modal-close-btn button:hover { color: var(--white); }
    .modal-photo-wrap { width: 100%; max-height: 300px; overflow: hidden; }
    .modal-photo-wrap img { width: 100%; object-fit: cover; display: block; }
    .modal-content { padding: 1.4rem 1.5rem; }
    .modal-user-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
    .modal-av { width: 38px; height: 38px; border-radius: 50%; background: rgba(232,184,75,0.1); border: 1px solid rgba(232,184,75,0.2); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--gold); }
    .modal-uname { font-weight: 600; font-size: 0.88rem; }
    .modal-utime { font-size: 0.68rem; color: var(--mid); }
    .modal-score { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; line-height: 1; margin-bottom: 0.8rem; }
    .modal-summary-text { font-size: 0.82rem; line-height: 1.8; color: rgba(240,237,232,0.45); margin-bottom: 1.2rem; }
    .modal-bars { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.2rem; }
    .bar-row { display: flex; align-items: center; gap: 0.7rem; }
    .bar-lbl { font-size: 0.7rem; color: var(--mid); width: 105px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.8s ease; }
    .bar-val { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; width: 22px; text-align: right; }
    .modal-imps-title { font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mid); margin-bottom: 0.7rem; margin-top: 0.5rem; }
    .imp-item { display: flex; gap: 0.7rem; margin-bottom: 0.6rem; }
    .imp-num { width: 20px; height: 20px; border-radius: 50%; background: rgba(232,184,75,0.1); border: 1px solid rgba(232,184,75,0.2); color: var(--gold); font-size: 0.62rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 0.1rem; }
    .imp-title { font-size: 0.82rem; font-weight: 500; }
    .imp-desc { font-size: 0.73rem; color: rgba(240,237,232,0.38); line-height: 1.6; margin-top: 0.15rem; }

    /* SUBMIT MODAL */
    .smodal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 400; align-items: center; justify-content: center; padding: 1rem; }
    .smodal-overlay.open { display: flex; }
    .smodal { background: var(--dark); border: 1px solid var(--border); max-width: 440px; width: 100%; }
    .smodal-head { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 1.4rem; border-bottom: 1px solid var(--border); }
    .smodal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.05em; }
    .smodal-x { background: none; border: none; color: var(--mid); font-size: 1.3rem; cursor: pointer; }
    .smodal-x:hover { color: var(--white); }
    .smodal-body { padding: 1.4rem; }
    .drop-zone { border: 2px dashed rgba(255,255,255,0.1); padding: 2.5rem 1rem; text-align: center; cursor: pointer; transition: border-color 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; }
    .drop-zone:hover, .drop-zone.drag { border-color: rgba(232,184,75,0.5); }
    .dz-icon { font-size: 2.2rem; }
    .dz-text { font-size: 0.8rem; color: rgba(240,237,232,0.38); line-height: 1.6; }
    .dz-text strong { color: var(--gold); }
    .preview-wrap { display: none; position: relative; margin-top: 0.8rem; }
    .preview-img { width: 100%; max-height: 200px; object-fit: contain; display: block; background: var(--dark2); }
    .preview-rm { position: absolute; top: 0.4rem; right: 0.4rem; background: rgba(0,0,0,0.7); border: none; color: var(--white); font-size: 0.72rem; padding: 0.2rem 0.45rem; cursor: pointer; }
    .limit-note { font-size: 0.7rem; color: var(--mid); text-align: center; margin-top: 0.8rem; }
    .limit-note strong { color: var(--gold); }
    .serror { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.2); color: #ff8080; padding: 0.65rem 0.9rem; font-size: 0.78rem; margin-top: 0.8rem; display: none; }
    .serror.show { display: block; }
    .sloading { text-align: center; padding: 1.5rem; display: none; }
    .sloading .sp { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 0.6rem; }
    .sloading p { font-size: 0.8rem; color: var(--mid); }
    .btn-analyse { width: 100%; background: var(--gold); color: var(--black); border: none; padding: 0.85rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; margin-top: 1rem; clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
    .btn-analyse:hover:not(:disabled) { background: var(--gold2); }
    .btn-analyse:disabled { opacity: 0.4; cursor: not-allowed; }

    .toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--dark); border: 1px solid var(--border); padding: 0.65rem 1.3rem; font-size: 0.8rem; opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(8,8,8,0.97); border-top: 1px solid var(--border); backdrop-filter: blur(16px); z-index: 98; padding-bottom: env(safe-area-inset-bottom); }
    .bottom-nav-inner { display: flex; }
    .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.6rem 0.3rem; text-decoration: none; color: rgba(240,237,232,0.35); font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase; gap: 0.25rem; border-top: 2px solid transparent; transition: color 0.2s; }
    .bottom-nav-item.active { color: var(--gold); border-top-color: var(--gold); }
    .bottom-nav-icon { font-size: 1.2rem; line-height: 1; }

    @media (max-width: 768px) {
      nav { padding: 0.9rem 1.2rem; }
      .nav-links { display: none !important; }
      .nav-burger { display: flex; }
      .submit-bar { padding: 0.7rem 1rem; top: 54px; }
      .bottom-nav { display: block; }
      body { padding-bottom: 70px; }
      .feed-wrap { padding: 1.5rem 0.8rem 5rem; }
    }
  </style>
</head>

<script>
var sb, currentUser, likedSet = new Set(), feedItems = [], pageNum = 0, allDone = false;
var uploadB64 = null, uploadMime = null, previewUrl = null;
var CATS = [
  {key:'subject_focus',label:'Subject Focus',icon:'Focus',color:'var(--c1)'},
  {key:'color_contrast',label:'Color Contrast',icon:'Color',color:'var(--c2)'},
  {key:'composition',label:'Composition',icon:'Comp',color:'var(--c3)'},
  {key:'lighting',label:'Lighting',icon:'Light',color:'var(--c4)'},
  {key:'background_blur',label:'Background Blur',icon:'Blur',color:'var(--c5)'},
  {key:'framing',label:'Framing',icon:'Frame',color:'var(--c6)'}
];
var PAGE = 10;

function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ago(d){ var m=Math.floor((Date.now()-new Date(d))/60000); if(m<1) return 'just now'; if(m<60) return m+'m ago'; var h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function scolor(s){ return s>=8?'var(--green)':s>=6?'var(--gold)':'rgba(240,237,232,0.5)'; }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000); }

function renderNavAuth(){
  var n=esc(currentUser.user_metadata&&currentUser.user_metadata.display_name||currentUser.email.split('@')[0]);
  document.getElementById('navAuthArea').innerHTML='<span style="font-size:0.72rem;color:rgba(240,237,232,0.3)">Hi, '+n+'</span> <button onclick="signOut()" style="background:none;border:none;cursor:pointer;font-size:0.72rem;color:rgba(240,237,232,0.3);font-family:DM Sans,sans-serif;text-transform:uppercase;letter-spacing:0.07em" onmouseover="this.style.color=\'var(--gold)\'" onmouseout="this.style.color=\'rgba(240,237,232,0.3)\'">Sign Out</button>';
}
function openMenu(){ document.getElementById('mobileMenu').classList.add('open'); document.body.style.overflow='hidden'; var el=document.getElementById('mobileUser'); if(el&&currentUser) el.textContent='Hi, '+(currentUser.user_metadata&&currentUser.user_metadata.display_name||currentUser.email.split('@')[0]); }
function closeMenu(){ document.getElementById('mobileMenu').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown',function(e){ if(e.key==='Escape'){closeDetail();closeSModal();closeMenu();} });

async function checkLimit(){
  var today=new Date().toISOString().split('T')[0];
  var r=await sb.from('analyses').select('id').eq('user_id',currentUser.id).eq('source','feed').gte('created_at',today+'T00:00:00Z').lte('created_at',today+'T23:59:59Z');
  var used=(r.data||[]).length; var left=Math.max(0,3-used);
  document.getElementById('dailyLeft').textContent=left;
  document.getElementById('limitNum').textContent=left;
  if(left===0){ document.getElementById('postBtn').disabled=true; document.getElementById('postBtn').textContent='Limit reached today'; }
  return left;
}

async function loadLikes(){
  try{
    var r=await sb.from('likes').select('analysis_id').eq('user_id',currentUser.id);
    likedSet=new Set((r.data||[]).map(function(x){return x.analysis_id;}));
  }catch(e){}
}

async function loadLikeCounts(){
  if(!feedItems.length) return;
  var ids=feedItems.map(function(x){return x.id;});
  try{
    var r=await sb.from('likes').select('analysis_id').in('analysis_id',ids);
    var counts={};
    (r.data||[]).forEach(function(x){ counts[x.analysis_id]=(counts[x.analysis_id]||0)+1; });
    ids.forEach(function(id){
      var el=document.getElementById('lc'+id);
      if(el) el.textContent=counts[id]||0;
    });
  }catch(e){}
}

async function loadFeed(reset){
  if(reset){ pageNum=0; allDone=false; feedItems=[]; document.getElementById('feedWrap').innerHTML='<div class="feed-loading"><div class="feed-spinner"></div></div>'; }
  if(allDone) return;
  var r=await sb.from('analyses').select('id,user_id,display_name,overall,subject_focus,color_contrast,composition,lighting,background_blur,framing,summary,improvements,thumbnail,image_url,created_at').eq('source','feed').order('created_at',{ascending:false}).range(pageNum*PAGE,(pageNum+1)*PAGE-1);
  var items=r.data||[];
  feedItems=feedItems.concat(items);
  pageNum++;
  if(items.length<PAGE){ allDone=true; document.getElementById('loadMoreBtn').style.display='none'; } else { document.getElementById('loadMoreBtn').style.display='block'; }
  renderFeed(reset);
  setTimeout(loadLikeCounts,100);
}

function renderFeed(reset){
  var w=document.getElementById('feedWrap');
  if(!feedItems.length){ w.innerHTML='<div class="feed-empty"><span class="feed-empty-icon">camera</span><p>No posts yet. Be first to post!</p></div>'; return; }
  w.innerHTML=feedItems.map(function(item,i){ return card(item,i); }).join('');
}

function card(item,i){
  var init=(item.display_name||'A').charAt(0).toUpperCase();
  var src=item.thumbnail?'data:image/jpeg;base64,'+item.thumbnail:(item.image_url||null);
  var liked=likedSet.has(item.id);
  var score=item.overall||0;
  var cats=CATS.map(function(c){ var v=item[c.key]; if(!v) return ''; return '<span class="feed-cat" style="color:'+c.color+';border-color:'+c.color+'33;background:'+c.color+'11">'+c.icon+' '+v+'</span>'; }).join('');
  return '<div class="feed-card" data-id="'+esc(item.id)+'">'
    +'<div class="feed-card-header">'
    +'<div class="feed-avatar" onclick="goProfile(\''+esc(item.user_id)+'\')">'+esc(init)+'</div>'
    +'<div class="feed-user"><div class="feed-name" onclick="goProfile(\''+esc(item.user_id)+'\')">'+esc(item.display_name||'Photographer')+'</div><div class="feed-time">'+ago(item.created_at)+'</div></div>'
    +'<div class="feed-score-badge" style="color:'+scolor(score)+'">'+score+'<span style="font-size:0.85rem;color:var(--mid)">/10</span></div>'
    +'</div>'
    +(src?'<div class="feed-photo" onclick="openDetail(\''+esc(item.id)+'\')"><img src="'+esc(src)+'" loading="lazy" alt="" onerror="this.parentElement.innerHTML=\'<div class=\\\'feed-photo-placeholder\\\'>photo</div>\'"></div>'
        :'<div class="feed-photo-placeholder">photo</div>')
    +(item.summary?'<div class="feed-summary">'+esc(item.summary)+'</div>':'')
    +(cats?'<div class="feed-cats">'+cats+'</div>':'')
    +'<div class="feed-actions">'
    +'<button class="like-btn'+(liked?' liked':'')+'" id="lb'+esc(item.id)+'" onclick="toggleLike(\''+esc(item.id)+'\')">'
    +(liked?'heart':'heart-outline')+' <span id="lc'+esc(item.id)+'">-</span></button>'
    +'<button class="detail-btn" onclick="openDetail(\''+esc(item.id)+'\')">See analysis</button>'
    +'</div>'
    +'</div>';
}

function loadMore(){ loadFeed(false); }

async function toggleLike(id){
  var liked=likedSet.has(id);
  var btn=document.getElementById('lb'+id);
  var cnt=document.getElementById('lc'+id);
  var n=parseInt(cnt&&cnt.textContent||'0')||0;
  if(liked){
    likedSet.delete(id);
    if(btn){ btn.classList.remove('liked'); btn.innerHTML='heart-outline <span id="lc'+id+'">'+(Math.max(0,n-1))+'</span>'; }
    await sb.from('likes').delete().eq('user_id',currentUser.id).eq('analysis_id',id);
  } else {
    likedSet.add(id);
    if(btn){ btn.classList.add('liked'); btn.innerHTML='heart <span id="lc'+id+'">'+(n+1)+'</span>'; }
    await sb.from('likes').upsert({user_id:currentUser.id,analysis_id:id},{onConflict:'user_id,analysis_id'});
  }
}

function openDetail(id){
  var item=feedItems.find(function(x){return x.id===id;});
  if(!item) return;
  var src=item.thumbnail?'data:image/jpeg;base64,'+item.thumbnail:(item.image_url||null);
  var init=(item.display_name||'A').charAt(0).toUpperCase();
  var score=item.overall||0;
  document.getElementById('dPhoto').innerHTML=src?'<img src="'+esc(src)+'" style="width:100%;object-fit:cover;display:block;max-height:280px" alt="">':'';
  document.getElementById('dAv').textContent=esc(init);
  document.getElementById('dName').textContent=esc(item.display_name||'Photographer');
  document.getElementById('dTime').textContent=ago(item.created_at);
  document.getElementById('dScore').textContent=score+'/10';
  document.getElementById('dScore').style.color=scolor(score);
  document.getElementById('dSummary').textContent=item.summary||'';
  document.getElementById('dBars').innerHTML=CATS.map(function(c){
    var v=item[c.key]||0;
    return '<div class="bar-row"><div class="bar-lbl">'+c.label+'</div><div class="bar-track"><div class="bar-fill" style="background:'+c.color+'" data-w="'+(v*10)+'%"></div></div><div class="bar-val" style="color:'+c.color+'">'+v+'</div></div>';
  }).join('');
  var rawI=item.improvements; if(typeof rawI==='string'){try{rawI=JSON.parse(rawI);}catch{rawI=[];}} var imps=Array.isArray(rawI)?rawI:[];
  document.getElementById('dImps').innerHTML=imps.length?'<div class="modal-imps-title">How to improve</div>'+imps.map(function(imp,i){ var t=typeof imp==='object'?imp.title:String(imp); var d=typeof imp==='object'?imp.desc:''; return '<div class="imp-item"><div class="imp-num">'+(i+1)+'</div><div><div class="imp-title">'+esc(t)+'</div>'+(d?'<div class="imp-desc">'+esc(d)+'</div>':'')+'</div></div>'; }).join(''):'';
  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow='hidden';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ document.querySelectorAll('.bar-fill').forEach(function(el){ el.style.width=el.dataset.w; }); }); });
}
function closeDetail(){ document.getElementById('detailModal').classList.remove('open'); document.body.style.overflow=''; }

function goProfile(uid){ window.location.href='profile.html?user='+uid; }

function openSModal(){ document.getElementById('sModal').classList.add('open'); document.body.style.overflow='hidden'; }
function closeSModal(){
  document.getElementById('sModal').classList.remove('open');
  document.body.style.overflow='';
  rmFile();
  document.getElementById('serr').classList.remove('show');
  document.getElementById('sload').style.display='none';
  document.getElementById('abtn').style.display='block';
}

function dzOver(e){ e.preventDefault(); document.getElementById('dz').classList.add('drag'); }
function dzLeave(e){ document.getElementById('dz').classList.remove('drag'); }
function dzDrop(e){ e.preventDefault(); document.getElementById('dz').classList.remove('drag'); handleFile(e.dataTransfer.files[0]); }
function onFile(e){ handleFile(e.target.files[0]); }

function handleFile(f){
  if(!f) return;
  if(!['image/jpeg','image/png','image/webp'].includes(f.type)){ serr('Please select JPG, PNG or WEBP'); return; }
  if(f.size>5*1024*1024){ serr('Image must be under 5MB'); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    var url=e.target.result;
    var img=new Image();
    img.onload=function(){
      var MAX=1024,w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      uploadB64=c.toDataURL('image/jpeg',0.92).split(',')[1];
      uploadMime='image/jpeg'; previewUrl=url;
      document.getElementById('pi').src=url;
      document.getElementById('pw').style.display='block';
      document.getElementById('dz').style.display='none';
      document.getElementById('abtn').disabled=false;
    };
    img.src=url;
  };
  reader.readAsDataURL(f);
}

function rmFile(){
  uploadB64=null; uploadMime=null; previewUrl=null;
  document.getElementById('pw').style.display='none';
  document.getElementById('dz').style.display='flex';
  document.getElementById('abtn').disabled=true;
  document.getElementById('fi').value='';
}

function serr(m){ var el=document.getElementById('serr'); el.textContent=m; el.classList.add('show'); }

async function thumb(dataUrl){
  return new Promise(function(res){
    var img=new Image();
    img.onload=function(){
      var MAX=600,w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.85).split(',')[1]);
    };
    img.onerror=function(){res(null);};
    img.src=dataUrl;
  });
}

async function doSubmit(){
  if(!uploadB64) return;
  var left=await checkLimit();
  if(left===0){ serr("Daily limit reached. Come back tomorrow!"); return; }
  document.getElementById('serr').classList.remove('show');
  document.getElementById('sload').style.display='block';
  document.getElementById('abtn').style.display='none';
  try{
    var sess=await sb.auth.getSession();
    var token=sess.data&&sess.data.session&&sess.data.session.access_token;
    var resp=await fetch(window.location.origin+'/api/analyse',{
      method:'POST',
      headers:Object.assign({'Content-Type':'application/json'},token?{Authorization:'Bearer '+token}:{}),
      body:JSON.stringify({imageContent:{type:'image',source:{type:'base64',media_type:uploadMime,data:uploadB64}}})
    });
    var raw=await resp.text(); var parsed;
    try{parsed=JSON.parse(raw);}catch(e){throw new Error('Invalid response');}
    if(resp.status===429){ serr(parsed.message||'Daily limit reached'); document.getElementById('sload').style.display='none'; document.getElementById('abtn').style.display='block'; return; }
    if(!resp.ok) throw new Error(parsed.error||'Analysis failed');
    if(parsed.rejected){ serr('Real photos only: '+parsed.reason); document.getElementById('sload').style.display='none'; document.getElementById('abtn').style.display='block'; return; }
    var tn=await thumb(previewUrl);
    parsed.source='feed';
    var saveR=await saveAnalysis(currentUser,'feed-post',parsed,tn);
    if(saveR.error) throw new Error(saveR.error.message);
    closeSModal();
    toast('Posted! Your photo is in the feed.');
    await checkLimit();
    await loadFeed(true);
    await loadLikeCounts();
  }catch(e){
    serr('Failed: '+e.message);
    document.getElementById('sload').style.display='none';
    document.getElementById('abtn').style.display='block';
  }
}

async function init(){
  var t=setTimeout(function(){window.location.href='login.html';},5000);
  try{
    initSupabase();
    currentUser=await getUser();
    clearTimeout(t);
    if(!currentUser){window.location.href='login.html';return;}
    document.body.classList.add('auth-ready');
    renderNavAuth();
    await Promise.all([loadLikes(),checkLimit(),loadFeed(true)]);
    await loadLikeCounts();
  }catch(e){ clearTimeout(t); window.location.href='login.html'; }
}
init();
</script>
